{% extends 'base.html' %}
{% block title %}Create Party{% endblock %}
{% block content %}
<form method="post" action="{% url 'ChoiceMaker:add_choice' question.id %}">
    {% csrf_token %}
    <fieldset>
        <legend><h1>{{ question.question_text }}</h1></legend>
        {% if error_message %}<p><strong>{{ error_message }}</strong></p>{% endif %}
        <input type="text" id="pname" name="partyname" placeholder="Your party..">
    </fieldset>
    <input type="submit" value="Add">
</form>
{% endblock %}
